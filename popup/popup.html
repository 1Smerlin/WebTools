<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WebTools</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>WebTools</h1>
      <p class="hint">
        Kombinierte Funktionen aus SpeechDictation + WebReader für Chromium.
      </p>

      <section>
        <h2>Diktat</h2>
        <button id="toggleDictation">Diktat starten</button>
        <p id="dictationState">Status: Aus</p>
      </section>

      <section>
        <h2>Vorlesen</h2>
        <button id="readSelection">Auswahl vorlesen</button>
        <button id="readPage">Seite vorlesen</button>
        <button id="stopReading" class="danger">Stop</button>
      </section>

      <section>
        <h2>Stimme</h2>
        <label>
          Geschwindigkeit
          <input
            id="rate"
            type="range"
            min="0.6"
            max="1.8"
            step="0.1"
            value="1"
          />
        </label>
        <output id="rateValue">1.0x</output>

        <label class="spaced">
          Sprache
          <select id="lang">
            <option value="de-DE">Deutsch (de-DE)</option>
            <option value="en-US">English (en-US)</option>
            <option value="fr-FR">Français (fr-FR)</option>
            <option value="es-ES">Español (es-ES)</option>
          </select>
        </label>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
